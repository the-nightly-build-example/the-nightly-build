# An open desk: no item list; the beat in prompt.md IS the assignment. Each
# night the agent picks an unexplored topic within the beat, chooses whichever
# declared template fits it best, and coins the slug. You stay the editor (see
# commissioning, below).
name: The Wildcard Desk
mode: open
section: "The Wildcard"
templates: [article, brief] # the night shift's choice, per topic
prompt: prompt.md
autopublish: true
strict: false
min_sources: 8
# No words band here on purpose: this desk publishes either shape, and a word
# floor would misfire on its brief editions. min_sources is the quality lever
# that applies to both. A single-shape desk (see frontier-compute) can set one.
# cadence: [tue, thu, sat]    # give a desk a rhythm; default is nightly
# paused: true                # vacation switch; the archive stays up

# Commissioning: drop items here and the desk must publish them (in any order)
# before it freestyles again. An item may carry its own prompt and sources.
# items:
#   - slug: the-cuda-moat
#     title: How Deep Is the CUDA Moat, Really?
#     prompt: "Engineer's-eye view; benchmark the alternatives honestly."
