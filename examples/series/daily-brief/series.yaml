# nights are skipped, never backfilled. No items list; the date is the item.
name: Daily Brief
mode: rolling
section: "The Daily"
template: brief
prompt: prompt.md
autopublish: true
strict: false
min_sources: 6
cadence: daily # or: weekdays | weekends | [mon, wed, fri]
