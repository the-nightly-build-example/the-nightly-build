# A collection: items publish front-to-back, one per night, until done.
name: Frontier Compute
mode: collection
section: "Compute & Industry"
template: article
prompt: prompt.md
autopublish: true
strict: false
words: [2500, 6000] # dossiers run long; tightens the article floor (never below 800)
min_sources: 10
tags: # shared angle fragments, pulled in when an item carries the tag
  equity: ../_tags/equity.md
  policy: ../_tags/policy.md
# cadence: [mon, thu]   # heavyweight dossiers twice a week; default is nightly
# selection: random     # publish items in any order instead of front-to-back
# paused: true          # vacation switch; the archive stays up
items:
  - slug: nvidia
    title: Nvidia
    tags: [equity, policy]
    # Item-level prompt: specializes the series prompt for this item only.
    prompt: "Center the dossier on the data-center segment and the CUDA moat;
      give the export-control fight a section of its own."
    # Item-level consult: must-read starting points for THIS item. The agent
    # reads these before researching elsewhere; citing them is optional.
    consult:
      - https://www.sec.gov/
      - https://investor.nvidia.com/
  - slug: tsmc
    title: TSMC
    tags: [equity]
    prompt: "The moat is process leadership and the fab's role as the
      industry's shared bottleneck; weigh the Arizona buildout against
      Taiwan concentration risk."
    consult:
      - https://investor.tsmc.com/
  - slug: asml
    title: ASML
    tags: [equity]
    prompt: "EUV lithography is a monopoly; explain the chokepoint and why it
      cannot be replicated on any near horizon."
    # Committed source material the agent must read AND cite (place files
    # under series/frontier-compute/sources/):
    # required_docs:
    #   - id: asml-annual-2025
    #     path: sources/asml-annual-2025.txt
  - slug: sk-hynix
    title: SK Hynix
    tags: [equity]
    prompt: "HBM is the AI memory bottleneck; trace the supply agreements and
      the memory-cycle debate that decides the stock."
