# An open section on the shipped `unbiased` template. Each article takes ONE
# genuinely contested question and argues both sides at their strongest from
# named, vetted sources. The template enforces exactly two sides plus a crux;
# `strict` promotes every WARN to a BLOCK, so the per-side citation checks
# become hard gates. A one-sided or thinly-sourced article cannot publish.
name: The Divide
mode: open
section: "Opinion"
template: unbiased # a shipped template. Open sections may also list `templates:`
prompt: prompt.md
autopublish: true
strict: true # the integrity section runs strict on purpose
min_sources: 10 # both sides sourced to primaries. Aim well past this
# A count cannot tell ten sources from one advocacy shop from ten independent
# ones. The floor is the number; this is the mix. `null` is no upper bound.
sources_by_kind:
  primary: [4, null]
  secondary: [3, null]
cadence: [mon, wed, fri]
