# The full source-policy showcase: committed required reading, consult-first
# URLs, and sources_exclusive — this deck may cite NOTHING outside the
# declared set (an outside citation is a BLOCK; the agent fixes it in-loop).
name: The Rules of AI
mode: collection
template: deck
prompt: prompt.md
autopublish: true
strict: false
sources_exclusive: true
required_docs:
  # Committed source material: must be read, and must appear as a cited
  # source entry carrying data-nb-required="nist-ai-rmf".
  - id: nist-ai-rmf
    path: sources/nist-ai-rmf-excerpt.txt
consult:
  # Must-visit starting points; under sources_exclusive they are also the
  # ONLY citable universe (plus the required docs above).
  - https://www.nist.gov/
  - https://nvlpubs.nist.gov/
  - https://doi.org/10.6028/
  - https://eur-lex.europa.eu/
  - https://artificialintelligenceact.eu/
  - https://www.whitehouse.gov/
  - https://www.congress.gov/
tags:
  policy: ../_tags/policy.md
items:
  - slug: the-rules-are-already-here
    title: The Rules Are Already Here
    tags: [policy]
