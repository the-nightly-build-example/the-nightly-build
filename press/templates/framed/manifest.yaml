# The machine contract for the framed template: an article that must open
# with the paper's Prior Context card before its own argument. The card is an
# anchor section, so the proof blocks an article without it; its name line is
# chrome, so a writer cannot reword it. The reading rows are editorial
# (catalog.md and editorial.md govern them), never chrome: chrome must appear
# in every article, and the rows may be absent when nothing honest qualifies.
about: "An article that opens with the paper's Prior Context card: the stake, the learning it underwrites, two prior readings. The geometry is fixed; the genre is whatever the series prompt asks for."
class: longread
words: [1200, 2400]
sections: [prior, orientation, sources]
flex_sections: [2, 5]
cite_rule: per-section
cite_exempt: [prior] # the card is apparatus, not claims
modes: [open]
chrome:
  - '<body class="nb-article">'
  - "<h2>Sources</h2>"
  - '<section class="rs-prior" data-nb-section="prior" id="prior">'
  - '<p class="rs-prior-name">Prior Context</p>'
