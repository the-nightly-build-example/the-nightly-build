# The machine contract for the article template: the geometry engine/check.py
# enforces (PROTOCOL step 2.4 reads it). A template is a citation geometry, not a
# genre; the `article` template is enforced prose (two anchors plus 2-6 sections,
# every section cited), and genres live in series prompts. Bands are template
# defaults that a series may replace in either direction. A press adds or
# redefines templates as folder packages under press/templates/<id>/.
about: "Enforced prose for anything told in sections. The geometry is fixed; the genre is whatever the series prompt asks for."
class: longread
bands:
  words: [800, 6000]
  flex_sections: [2, 6]
sections: [orientation, sources]
cite_rule: per-section
chrome:
  - '<body class="nb-article">'
  - "<h2>Sources</h2>"
