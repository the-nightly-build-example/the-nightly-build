# The machine contract for the opinion template: an argued position, never
# both-sides reporting. Two anchors do the enforcement. `position` opens the
# piece with the position card, so the stance is disclosed before any
# argument. `counter` can never be skipped: the strongest opposing case,
# stated and answered. The argument itself is 2-5 flex sections, each cited;
# an opinion meets the same bar as any analysis (spec/editorial.md).
about: "An argued position: the stance disclosed up front on the position card, the case built in cited sections, the strongest opposing case answered."
class: longread
words: [900, 2500]
sections: [position, counter, sources]
flex_sections: [2, 5]
cite_rule: per-section
modes: [collection, open]
chrome:
  - '<body class="nb-article">'
  - '<div class="nb-position">'
  - '<span class="nb-position-pill">Position</span>'
  - "<h2>Sources</h2>"
