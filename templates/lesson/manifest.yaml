# The machine contract for the lesson template: two bookends frame the
# body, both anchored sections, so the proof blocks a lesson missing
# either. Their name lines and band labels are chrome a writer cannot
# reword. The reading rows are editorial (furniture.md and identity.md
# govern them). Bookends are apparatus, not claims, so they are exempt
# from the citation rule.
about: "A lesson: opens on Why this matters, closes on The takeaway, both written after the body. Teaches one subject to a smart reader who is new to it."
class: longread
words: [1200, 2200]
sections: [why, orientation, takeaway, sources]
flex_sections: [0, 4]
cite_rule: per-section
cite_exempt: [why, takeaway]
modes: [open]
chrome:
  - '<body class="nb-article">'
  - "<h2>Sources</h2>"
  - '<section class="nb-bookend" data-nb-section="why" id="why">'
  - '<p class="nb-bookend-name">Why this matters</p>'
  - '<section class="nb-bookend" data-nb-section="takeaway" id="takeaway">'
  - '<p class="nb-bookend-name">The takeaway</p>'
  - '<span class="nb-bookend-label">Background</span>'
  - '<span class="nb-bookend-label">Go deeper</span>'
  - '<span class="nb-bookend-note">optional reading</span>'
